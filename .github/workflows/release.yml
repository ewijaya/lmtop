name: Release

# Releases are cut by pushing a version tag, not by pushing to main: an
# ordinary commit should stay cheap, while a release is a deliberate act.
#
#   cargo set-version 0.2.0   (or edit Cargo.toml)
#   git commit -am "chore: release v0.2.0"
#   git tag v0.2.0 && git push origin main --tags
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Never publish a release from a tag whose tests don't pass.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --all-features

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # aarch64 Linux needs a cross linker; the others build natively.
      - name: Install cross linker
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          name="lmtop-${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release/lmtop" "dist/${name}/"
          cp README.md LICENSE "dist/${name}/"
          tar -czf "dist/${name}.tar.gz" -C dist "${name}"
          echo "archive=dist/${name}.tar.gz" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Bumps the formula in the tap repo, authenticating with a deploy key that
  # grants write access to ewijaya/homebrew-tap and nothing else (a PAT would
  # carry rights over every repo on the account). Skipped with a warning when
  # the secret is absent, so a release never fails on the tap step.
  bump-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check for tap deploy key
        id: check
        run: |
          if [ -n "${{ secrets.TAP_DEPLOY_KEY }}" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::TAP_DEPLOY_KEY not set; skipping Homebrew formula bump."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        if: steps.check.outputs.ok == 'true'
        with:
          path: artifacts
          merge-multiple: true

      - uses: actions/checkout@v4
        if: steps.check.outputs.ok == 'true'
        with:
          repository: ewijaya/homebrew-tap
          ssh-key: ${{ secrets.TAP_DEPLOY_KEY }}
          path: tap

      - name: Update formula
        if: steps.check.outputs.ok == 'true'
        env:
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          set -euo pipefail
          cd artifacts
          sha() { sha256sum "lmtop-${VERSION}-$1.tar.gz" | cut -d' ' -f1; }
          mac_arm=$(sha aarch64-apple-darwin)
          mac_x86=$(sha x86_64-apple-darwin)
          lin_arm=$(sha aarch64-unknown-linux-gnu)
          lin_x86=$(sha x86_64-unknown-linux-gnu)
          cd ..

          mkdir -p tap/Formula
          base="https://github.com/ewijaya/lmtop/releases/download/v${VERSION}"
          cat > tap/Formula/lmtop.rb <<EOF
          # Generated by lmtop's release workflow. Do not edit by hand.
          class Lmtop < Formula
            desc "Live terminal monitor for language-model usage, quotas, and subscription capacity"
            homepage "https://github.com/ewijaya/lmtop"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${base}/lmtop-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${mac_arm}"
              end
              on_intel do
                url "${base}/lmtop-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${mac_x86}"
              end
            end

            on_linux do
              on_arm do
                url "${base}/lmtop-${VERSION}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${lin_arm}"
              end
              on_intel do
                url "${base}/lmtop-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${lin_x86}"
              end
            end

            def install
              bin.install "lmtop"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/lmtop --version")
            end
          end
          EOF

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/lmtop.rb
          git diff --staged --quiet || git commit -m "lmtop ${VERSION}"
          git push
